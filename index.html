<script>
const firebaseConfig = {
  apiKey: "AIzaSyDfcLi_OyL9lV50tQUEUwQPCcyjQfWI0Z8",
  authDomain: "miner-app-668d2.firebaseapp.com",
  projectId: "miner-app-668d2",
  storageBucket: "miner-app-668d2.firebasestorage.app",
  messagingSenderId: "699872350636",
  appId: "1:699872350636:web:cb37f5bfa28153f955ea09"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser;
let running = false;
let balance = 0;

function register(){
  auth.createUserWithEmailAndPassword(email.value, pass.value);
}

function login(){
  auth.signInWithEmailAndPassword(email.value, pass.value);
}

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("user").innerText = user.email;
    loadData();
  }
});

function loadData(){
  db.collection("users").doc(currentUser.uid).get()
  .then(doc=>{
    if(doc.exists){
      balance = doc.data().balance || 0;
    } else {
      db.collection("users").doc(currentUser.uid).set({ balance:0 });
    }
    updateUI();
    loadLeaderboard();
  });
}

function updateUI(){
  document.getElementById("balance").innerText = balance.toFixed(4);
}

function save(){
  db.collection("users").doc(currentUser.uid).update({
    balance: balance
  });
}

function start(){
  running = true;
  document.getElementById("status").innerText="Running";

  setInterval(()=>{
    if(!running) return;

    let h = Math.floor(Math.random()*500)+100;
    document.getElementById("hashrate").innerText = h;

    balance += h / 100000;
    updateUI();
    save();
    loadLeaderboard();

  },1000);
}

function stop(){
  running=false;
  document.getElementById("status").innerText="Stopped";
}

function loadLeaderboard(){
  db.collection("users").orderBy("balance","desc").limit(10)
  .get()
  .then(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
      html += doc.id.substring(0,6) + " : " + doc.data().balance.toFixed(2) + "<br>";
    });
    document.getElementById("leaderboard").innerHTML = html;
  });
}
</script>
