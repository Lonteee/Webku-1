<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Miner Pro App</title>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  font-family:Segoe UI;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius:16px;
  padding:20px;
  margin:15px 0;
  backdrop-filter: blur(12px);
}

button {
  background: linear-gradient(135deg,#22c55e,#16a34a);
  border:none;
  padding:10px;
  border-radius:10px;
  color:white;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}
</style>

</head>

<body>

<h2>💎 Crypto Reward App</h2>

<div id="login">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="loginUser()">Login</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>Portfolio</h3>
<h1 id="balance">0</h1>
</div>

<div class="card">
Status: <span id="status">Stopped</span><br>
Hashrate: <span id="hashrate">0</span>
</div>

<button onclick="start()">Start</button> <button onclick="stop()">Stop</button>

<div class="card">
<h3>Withdraw</h3>
<input id="wallet" placeholder="Wallet / No HP">
<input id="amount" type="number" placeholder="Jumlah Coin">
<button onclick="withdraw()">Withdraw</button>
<p id="wdStatus"></p>
</div>

<div class="card">
<h3>Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<!-- Admin -->

<div id="adminPanel" style="display:none">
<div class="card">
<h3>Admin Panel</h3>
<div id="withdrawList"></div>
</div>
</div>

</div>

<script>

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDfcLi_OyL9lV50tQUEUwQPCcyjQfWI0Z8",
  authDomain: "miner-app-668d2.firebaseapp.com",
  projectId: "miner-app-668d2"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_EMAIL = "muhammadgonang1@gmail.com";

let currentUser;
let balance = 0;
let running = false;

// REGISTER
function register(){
  auth.createUserWithEmailAndPassword(email.value, pass.value)
  .catch(e=>alert(e.message));
}

// LOGIN
function loginUser(){
  auth.signInWithEmailAndPassword(email.value, pass.value)
  .catch(e=>alert(e.message));
}

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;

    login.style.display="none";
    app.style.display="block";

    if(user.email === ADMIN_EMAIL){
      adminPanel.style.display="block";
      loadWithdraws();
    }

    loadData();
  }
});

// LOAD DATA
function loadData(){
  db.collection("users").doc(currentUser.uid).get()
  .then(doc=>{
    if(doc.exists){
      balance = doc.data().balance || 0;
    } else {
      db.collection("users").doc(currentUser.uid).set({balance:0});
    }
    updateUI();
    loadLeaderboard();
  });
}

function updateUI(){
  balanceEl.innerText = balance.toFixed(4);
}

// SAVE
function save(){
  db.collection("users").doc(currentUser.uid).update({
    balance: balance
  });
}

// MINING SIMULASI
function start(){
  running = true;
  status.innerText="Running";

  setInterval(()=>{
    if(!running) return;

    let h = Math.floor(Math.random()*500)+100;
    hashrate.innerText = h;

    balance += h/100000;
    updateUI();
    save();

  },1000);
}

function stop(){
  running=false;
  status.innerText="Stopped";
}

// WITHDRAW
function withdraw(){
  let wallet = wallet.value;
  let amount = parseFloat(amount.value);

  if(amount > balance){
    alert("Saldo tidak cukup");
    return;
  }

  db.collection("withdraws").add({
    user: currentUser.uid,
    email: currentUser.email,
    wallet: wallet,
    amount: amount,
    status: "pending",
    time: Date.now()
  });

  balance -= amount;
  save();
  updateUI();

  wdStatus.innerText="Request dikirim";
}

// LEADERBOARD
function loadLeaderboard(){
  db.collection("users").orderBy("balance","desc").limit(10)
  .get().then(snap=>{
    let html="";
    snap.forEach(doc=>{
      html += doc.id.slice(0,6)+" : "+doc.data().balance.toFixed(2)+"<br>";
    });
    leaderboard.innerHTML = html;
  });
}

// ADMIN
function loadWithdraws(){
  db.collection("withdraws").get()
  .then(snap=>{
    let html="";
    snap.forEach(doc=>{
      let d = doc.data();

      html += `
      ${d.email} - ${d.amount} <br>
      <button onclick="approve('${doc.id}')">Approve</button>
      <button onclick="reject('${doc.id}')">Reject</button>
      <hr>
      `;
    });
    withdrawList.innerHTML = html;
  });
}

function approve(id){
  db.collection("withdraws").doc(id).update({status:"approved"});
  loadWithdraws();
}

function reject(id){
  db.collection("withdraws").doc(id).update({status:"rejected"});
  loadWithdraws();
}

</script>

</body>
</html>
